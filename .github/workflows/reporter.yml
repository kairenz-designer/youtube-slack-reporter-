name: YouTube Reporter Bot

on:
  schedule:
    - cron: '*/10 * * * *'   # Every 10 minutes, 24/7
  workflow_dispatch:           # Manual trigger from GitHub UI

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Restore state database
        uses: actions/cache@v4
        with:
          path: state.db
          key: state-db-${{ github.run_number }}
          restore-keys: state-db-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_OWNER_EMAIL: ${{ secrets.YOUTUBE_OWNER_EMAIL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python run_once.py
